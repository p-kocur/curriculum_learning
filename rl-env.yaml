name: curriculum-env
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - numpy
  - pytorch
  - pytorch-cuda=11.8 
  - torchvision
  - torchaudio
  - pip:
      - gymnasium[box2d,atari,accept-rom-license]
      - stable-baselines3
      - pyglet
      - PyOpenGL
      - glfw
      - scikit-learn
      - matplotlib
